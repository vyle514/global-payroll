<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Payroll System</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Load Font Awesome for more professional icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" xintegrity="sha512-SnH5WK+bZxgPHs44uWIX+LLMDJzLwQxZPTF5+sJtJ/jRRTWq5sU2+jUoU1P2iR2U3Zg4S8T7v/c5TqJ3bU6E0Ww==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Use Poppins font (Elegant and Modern) -->
    <style>
        /* Clean professional palette */
        :root {
            --color-primary: #000000; /* Indigo */
            --color-secondary: #E0E7FF; /* Light indigo */
            --color-tertiary: #000000; /* Dark indigo */
            --color-accent: #F0F4FF; /* Very light indigo */
            --color-indigo: #000000;
            --color-red: #DC2626;
            --color-purple: #7C3AED;
            --color-teal: #0D9488;
            --color-pink: #DB2777;
            --color-fuchsia: #A21CAF;
            --color-dark-gray: #09090B;
            --color-light-gray: #FAFAF9;

            /* Light mode variables */
            --bg-primary: #FAFAFA;
            --bg-secondary: #FFFFFF;
            --text-primary: #09090B;
            --text-secondary: #52525B;
            --border-color: #E4E4E7;

            /* Clean card variables */
            --glass-bg: rgba(255, 255, 255, 0.95);
            --glass-bg-light: rgba(255, 255, 255, 1);
            --glass-bg-dark: rgba(248, 250, 252, 0.98);
            --glass-border: rgba(226, 232, 240, 0.8);
            --glass-border-light: rgba(226, 232, 240, 1);
            --glass-shadow: 0 1px 3px rgba(15, 23, 42, 0.08), 0 1px 2px rgba(15, 23, 42, 0.04);
            --glass-shadow-heavy: 0 4px 12px rgba(15, 23, 42, 0.1), 0 2px 4px rgba(15, 23, 42, 0.06);
        }
        
        /* Dark mode theme */
        [data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #334155;
        }

        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: #FAFAFA;
            min-height: 100vh;
            transition: background 0.3s ease;
            line-height: 1.6;
            letter-spacing: -0.01em;
            position: relative;
        }

        body::before {
            display: none;
        }

        
        /* Dark mode body */
        [data-theme="dark"] body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
        
        /* Particles hidden */
        .bg-particles, .particle { display: none; }
        
        /* Clean Hero Section */
        .hero-container {
            position: relative;
            background: #09090B;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            overflow: hidden;
            margin: 1.5rem 1.5rem 0;
            padding: 1.5rem 2rem;
            box-shadow: 0 4px 24px rgba(15, 23, 42, 0.2);
            gap: 2rem;
        }
        .hero-left { position: relative; z-index: 10; }
        .hero-stats {
            position: relative;
            z-index: 10;
            display: flex;
            gap: 1.25rem;
            flex-shrink: 0;
        }
        .hero-stat {
            text-align: right;
            color: #FFFFFF;
            border-left: 1px solid rgba(255,255,255,0.12);
            padding-left: 1.25rem;
        }
        .hero-stat:first-child { border-left: none; padding-left: 0; }
        .hero-stat-num {
            font-size: 1.6rem;
            font-weight: 700;
            line-height: 1;
            color: #FFFFFF;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.02em;
        }
        .hero-stat-lbl {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.55);
            margin-top: 0.25rem;
            font-weight: 500;
        }
        @media (max-width: 768px) {
            .hero-container { flex-direction: column; align-items: flex-start; padding: 1.25rem 1.25rem; gap: 1rem; }
            .hero-stats { flex-wrap: wrap; }
        }

        .hero-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse at 70% 50%, rgba(79, 70, 229, 0.2) 0%, transparent 60%);
            z-index: 0;
        }

        .hero-mesh { display: none; }
        .floating-orbs { display: none; }

        .hero-content {
            position: relative;
            z-index: 10;
            color: white;
        }

        .hero-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: rgba(165,180,252,0.15);
            border: 1px solid rgba(165,180,252,0.25);
            color: #E4E4E7;
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.3rem 0.7rem;
            border-radius: 99px;
            margin-bottom: 0.75rem;
        }

        .hero-title {
            font-size: clamp(1.4rem, 2.4vw, 1.85rem);
            font-weight: 700;
            margin-bottom: 0.4rem;
            line-height: 1.2;
            letter-spacing: -0.02em;
            color: #FFFFFF;
        }

        .hero-subtitle {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.65);
            margin-bottom: 0;
            max-width: 480px;
        }

        /* Clean card system */
        .benefits-card {
            background: #FAFAF9;
            border: 1px solid #E4E4E7;
            box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
            transition: box-shadow 0.2s ease, border-color 0.2s ease;
            position: relative;
            padding: 1.5rem;
            border-radius: 12px;
            overflow: hidden;
            line-height: 1.6;
        }

        .benefits-card::before { display: none; }

        .benefits-card::after { display: none; }

        .benefits-card:hover {
            border-color: #E4E4E7;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.08);
        }

        .card-inner {
            position: relative;
            z-index: 1;
        }

        /* CALCULATOR PAGE */
        .calc-page-wrap { max-width: 1280px; margin: 0 auto; }
        .calc-page-wrap > #calc-page-host { max-width: 760px; margin: 0 auto; }
        .calc-page-hero {
            background: linear-gradient(135deg, #09090B 0%, #1E1B4B 50%, #312E81 100%);
            border-radius: 16px;
            padding: 1.5rem 2rem;
            margin-bottom: 1rem;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 2rem;
        }
        .calc-page-hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(99,102,241,0.35), transparent 60%);
            pointer-events: none;
        }
        .calc-page-hero-inner { position: relative; z-index: 1; flex: 1; min-width: 0; }
        .calc-hero-country {
            position: relative;
            z-index: 1;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
            min-width: 200px;
        }
        .calc-hero-country label {
            color: rgba(255,255,255,0.55);
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .calc-hero-country select {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: #FFFFFF;
            padding: 0.55rem 0.85rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-family: inherit;
            cursor: pointer;
            outline: none;
            backdrop-filter: blur(8px);
        }
        .calc-hero-country select:hover {
            background: rgba(255,255,255,0.14);
            border-color: rgba(165,180,252,0.4);
        }
        .calc-hero-country select option {
            background: #1E1B4B;
            color: #FFFFFF;
        }
        @media (max-width: 600px) {
            .calc-page-hero { flex-direction: column; align-items: flex-start; gap: 1rem; padding: 1.25rem 1.25rem; }
            .calc-hero-country { width: 100%; }
        }

        /* TOKEN VESTING PAGE */
        .tk-page { max-width: 1280px; margin: 0 auto; padding: 0 0.5rem; }

        .tk-hero {
            position: relative;
            background: linear-gradient(135deg, #09090B 0%, #1E1B4B 50%, #312E81 100%);
            border-radius: 16px;
            padding: 1.5rem 2rem;
            margin-bottom: 1rem;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 2rem;
        }
        .tk-hero-glow {
            position: absolute;
            top: -50%;
            right: -20%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(99,102,241,0.35) 0%, transparent 60%);
            pointer-events: none;
        }
        .tk-hero-inner { position: relative; z-index: 1; flex: 1; min-width: 0; }
        .tk-hero-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: rgba(165,180,252,0.15);
            border: 1px solid rgba(165,180,252,0.25);
            color: #E4E4E7;
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.3rem 0.7rem;
            border-radius: 99px;
            margin-bottom: 0.6rem;
        }
        .tk-hero-title {
            color: #FFFFFF;
            font-size: 1.45rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 0.35rem;
            letter-spacing: -0.02em;
        }
        .tk-hero-sub {
            color: #CBD5E1;
            font-size: 0.82rem;
            line-height: 1.5;
            max-width: 560px;
            margin-bottom: 0;
        }
        .tk-hero-stats {
            position: relative;
            z-index: 1;
            display: flex;
            gap: 1.25rem;
            flex-shrink: 0;
        }
        .tk-stat {
            text-align: right;
            color: #FFFFFF;
            border-left: 1px solid rgba(255,255,255,0.12);
            padding-left: 1.25rem;
        }
        .tk-stat:first-child { border-left: none; padding-left: 0; }
        .tk-stat.danger .tk-stat-num { color: #FCA5A5; }
        .tk-stat-num {
            color: #A5B4FC;
            font-size: 1.4rem;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 0.2rem;
        }
        .tk-stat-lbl {
            color: rgba(255,255,255,0.55);
            font-size: 0.65rem;
            font-weight: 500;
            white-space: nowrap;
        }

        .tk-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem 1.5rem;
            background: #FFFFFF;
            border: 1px solid #E4E4E7;
            border-radius: 12px;
            padding: 0.85rem 1.1rem;
            margin-bottom: 1.25rem;
            font-size: 0.72rem;
            color: #71717A;
        }
        .tk-legend-item { display: flex; align-items: center; gap: 0.5rem; }

        .tk-filter-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.75rem;
            flex-wrap: wrap;
        }
        .tk-region-pills { display: flex; flex-wrap: wrap; gap: 0.4rem; }
        .tk-region-pill {
            background: #FFFFFF;
            border: 1px solid #E4E4E7;
            color: #52525B;
            padding: 0.5rem 0.95rem;
            border-radius: 99px;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.18s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
        .tk-region-pill:hover {
            border-color: #818CF8;
            color: #000000;
            background: #FAFAFA;
        }
        .tk-region-pill.active {
            background: #000000;
            border-color: #000000;
            color: #FFFFFF;
            box-shadow: 0 2px 6px rgba(79,70,229,0.3);
        }
        .tk-search {
            position: relative;
            min-width: 280px;
        }
        .tk-search i {
            position: absolute;
            left: 0.85rem;
            top: 50%;
            transform: translateY(-50%);
            color: #A1A1AA;
            font-size: 0.78rem;
        }
        .tk-search input {
            width: 100%;
            background: #FFFFFF;
            border: 1px solid #E4E4E7;
            border-radius: 99px;
            padding: 0.55rem 1rem 0.55rem 2.25rem;
            font-size: 0.82rem;
            color: #09090B;
            font-family: inherit;
            outline: none;
            transition: all 0.15s;
        }
        .tk-search input:focus {
            border-color: #818CF8;
            box-shadow: 0 0 0 3px rgba(129,140,248,0.15);
        }
        .tk-result-line {
            font-size: 0.72rem;
            color: #A1A1AA;
            margin-bottom: 1rem;
            font-weight: 500;
        }
        .tk-result-line span { color: #000000; font-weight: 700; }

        .tk-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
            gap: 1rem;
        }

        .tk-card {
            background: #FFFFFF;
            border: 1px solid #E4E4E7;
            border-radius: 14px;
            overflow: hidden;
            transition: all 0.2s ease;
            box-shadow: 0 1px 3px rgba(15,23,42,0.04);
        }
        .tk-card:hover {
            border-color: #E4E4E7;
            box-shadow: 0 4px 14px rgba(79,70,229,0.08);
            transform: translateY(-1px);
        }
        .tk-card.expanded {
            border-color: #818CF8;
            box-shadow: 0 6px 20px rgba(79,70,229,0.12);
        }

        .tk-card-head {
            display: flex;
            align-items: center;
            gap: 0.85rem;
            padding: 1rem 1.15rem;
            cursor: pointer;
            border-bottom: 1px solid #FAFAFA;
        }
        .tk-flag {
            font-size: 2rem;
            line-height: 1;
            flex-shrink: 0;
        }
        .tk-card-title { flex: 1; min-width: 0; }
        .tk-country-name {
            font-size: 0.95rem;
            font-weight: 700;
            color: #09090B;
            margin-bottom: 0.15rem;
        }
        .tk-currency-line {
            font-size: 0.7rem;
            color: #A1A1AA;
            font-weight: 500;
        }
        .tk-status-wrap { flex-shrink: 0; }
        .tk-chevron {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #FAFAF9;
            border-radius: 8px;
            color: #71717A;
            font-size: 0.7rem;
            transition: transform 0.2s ease;
            flex-shrink: 0;
        }

        .tk-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.25rem 0.6rem;
            border-radius: 99px;
            font-size: 0.66rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            white-space: nowrap;
        }
        .tk-badge.success { background: #DCFCE7; color: #15803D; }
        .tk-badge.warning { background: #FEF3C7; color: #92400E; }
        .tk-badge.neutral { background: #DBEAFE; color: #1E40AF; }
        .tk-badge.danger  { background: #FEE2E2; color: #991B1B; }

        .tk-card-preview {
            padding: 0.85rem 1.15rem;
            background: #FAFBFF;
            display: flex;
            flex-direction: column;
            gap: 0.55rem;
        }
        .tk-preview-row {
            display: flex;
            gap: 0.65rem;
            align-items: flex-start;
            font-size: 0.76rem;
            color: #52525B;
            line-height: 1.45;
        }
        .tk-pi {
            color: #6366F1;
            font-size: 0.75rem;
            margin-top: 3px;
            flex-shrink: 0;
        }
        .tk-preview-label {
            font-weight: 700;
            color: #09090B;
            margin-right: 4px;
        }

        .tk-card-detail {
            padding: 1rem 1.15rem 1.15rem;
            border-top: 1px solid #FAFAFA;
            background: #FFFFFF;
        }
        .tk-section {
            background: #FAFAF9;
            border: 1px solid #E4E4E7;
            border-radius: 10px;
            padding: 0.85rem 1rem;
            margin-bottom: 0.65rem;
        }
        .tk-section.blue    { background: #EFF6FF; border-color: #BFDBFE; }
        .tk-section.purple  { background: #FAF5FF; border-color: #E9D5FF; }
        .tk-section.emerald { background: #ECFDF5; border-color: #A7F3D0; }
        .tk-section.amber   { background: #FFFBEB; border-color: #FDE68A; }

        .tk-sec-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.7rem;
            font-weight: 700;
            color: #4338CA;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }
        .tk-section.blue    .tk-sec-title { color: #1E40AF; }
        .tk-section.purple  .tk-sec-title { color: #6B21A8; }
        .tk-section.emerald .tk-sec-title { color: #047857; }
        .tk-section.amber   .tk-sec-title { color: #B45309; }

        .tk-sec-body {
            font-size: 0.78rem;
            color: #334155;
            line-height: 1.55;
        }

        .tk-grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.65rem;
            margin-bottom: 0.65rem;
        }

        .tk-steps {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: 0.25rem;
        }
        .tk-step {
            display: flex;
            gap: 0.7rem;
            align-items: flex-start;
            position: relative;
        }
        .tk-step-num {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #000000, #6366F1);
            color: #FFFFFF;
            font-size: 0.7rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            z-index: 1;
            box-shadow: 0 2px 4px rgba(79,70,229,0.25);
        }
        .tk-step-text {
            font-size: 0.78rem;
            color: #334155;
            line-height: 1.5;
            padding-top: 2px;
        }
        .tk-step-line {
            position: absolute;
            left: 11px;
            top: 24px;
            bottom: -8px;
            width: 2px;
            background: linear-gradient(180deg, #E4E4E7, transparent);
        }

        .tk-empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem 1rem;
            color: #A1A1AA;
            background: #FFFFFF;
            border: 2px dashed #E4E4E7;
            border-radius: 12px;
        }
        .tk-empty i { font-size: 2rem; margin-bottom: 0.5rem; display: block; }

        .tk-disclaimer {
            display: flex;
            gap: 0.85rem;
            margin-top: 1.5rem;
            padding: 1rem 1.25rem;
            background: linear-gradient(135deg, #FFF7ED, #FEF3C7);
            border: 1px solid #FED7AA;
            border-radius: 12px;
            font-size: 0.78rem;
            color: #78350F;
            line-height: 1.55;
        }
        .tk-disclaimer i {
            color: #D97706;
            font-size: 1.1rem;
            flex-shrink: 0;
            margin-top: 2px;
        }

        @media (max-width: 900px) {
            .tk-hero { flex-direction: column; align-items: flex-start; gap: 1rem; padding: 1.25rem 1.25rem; }
            .tk-hero-stats { width: 100%; flex-wrap: wrap; }
        }
        @media (max-width: 768px) {
            .tk-grid { grid-template-columns: 1fr; }
            .tk-grid-2 { grid-template-columns: 1fr; }
            .tk-hero-title { font-size: 1.25rem; }
            .tk-search { width: 100%; min-width: 0; }
        }

        /* TOP-LEVEL VIEW TABS */
        .view-tabs-wrapper {
            display: flex;
            gap: 0.5rem;
            margin: 1.5rem 1.5rem 0;
            padding: 0.5rem;
            background: #FFFFFF;
            border: 1px solid #E4E4E7;
            border-radius: 12px;
            box-shadow: 0 1px 3px rgba(15,23,42,0.06);
        }
        .view-tab {
            flex: 1;
            padding: 0.75rem 1.25rem;
            background: transparent;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #71717A;
            cursor: pointer;
            transition: all 0.18s ease;
        }
        .view-tab:hover {
            background: #FAFAF9;
            color: #000000;
        }
        .view-tab.active {
            background: #000000;
            color: #FFFFFF;
            box-shadow: 0 2px 6px rgba(79,70,229,0.25);
        }

        /* COUNTRY PICKER (regions + search + grid) */
        .country-picker-wrapper {
            background: #FFFFFF;
            border: 1px solid #E4E4E7;
            border-radius: 12px;
            padding: 1rem 1.25rem;
            margin: 1rem 1.5rem;
            box-shadow: 0 1px 3px rgba(15,23,42,0.06);
        }
        .cp-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 0.75rem;
        }
        .cp-region-pills { display: flex; flex-wrap: wrap; gap: 0.35rem; }
        .cp-region-pill {
            background: #FAFAF9;
            border: 1px solid #E4E4E7;
            color: #52525B;
            padding: 0.4rem 0.85rem;
            border-radius: 99px;
            font-size: 0.74rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.18s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
        }
        .cp-region-pill:hover { background: #FAFAFA; color: #000000; border-color: #E4E4E7; }
        .cp-region-pill.active {
            background: #000000; border-color: #000000; color: #FFFFFF;
            box-shadow: 0 2px 4px rgba(79,70,229,0.25);
        }
        .cp-search {
            position: relative;

        // Function to create table DOM element
        function createTable(tableData, cardColor) {
            let headerClass = 'bg-gradient-to-r from-gray-100 to-gray-200 text-gray-700';
            
            // Identify which columns are Employee/Employer columns
            const columnTypes = tableData.headers.map(header => {
                const headerText = header.replace(/<[^>]*>/g, '');
                if (headerText.toLowerCase().includes('employee') && !headerText.toLowerCase().includes('employer')) {
                    return 'employee';
                } else if (headerText.toLowerCase().includes('employer')) {
                    return 'employer';
                }
                return 'normal';
            });
            
            let html = `<div class="mt-3 border border-slate-100 rounded-xl overflow-hidden shadow-sm interactive-table compact-table">
                            <div class="px-3 py-2 bg-gradient-to-r from-slate-50 to-blue-50 text-sm font-semibold text-slate-700 border-b border-slate-200">${tableData.caption}</div>
                            <table class="min-w-full divide-y divide-slate-100 compact-table">
                                <thead class="${headerClass}">
                                    <tr>`;
            tableData.headers.forEach((header, index) => {
                const columnType = columnTypes[index];
                let headerStyle = '';
                
                // Color code Employee vs Employer columns - VERY LIGHT pastels
                if (columnType === 'employee') {
                    // Employee columns: Very light mint/teal
                    headerStyle = ' style="background: linear-gradient(135deg, #E0F5F5 0%, #EBF9F9 100%); color: #2C5F5F; border-left: 2px solid #B8E5E5;"';
                } else if (columnType === 'employer') {
                    // Employer columns: Very light peach/coral
                    headerStyle = ' style="background: linear-gradient(135deg, #FFE8D9 0%, #FFF0E6 100%); color: #8B5A3C; border-left: 2px solid #FFD4B8;"';
                }
                
                html += `<th class="px-3 py-2 text-left text-sm font-semibold uppercase tracking-wide hover:bg-opacity-90 transition-colors sortable" title="Click to sort this column"${headerStyle}>${header}</th>`;
            });
            html += `</tr></thead><tbody class="bg-white divide-y divide-slate-50 text-sm text-gray-700">`;
            tableData.rows.forEach((row, rowIndex) => {
                const rowBg = rowIndex % 2 === 0 ? 'bg-white hover:bg-slate-50' : 'bg-slate-25 hover:bg-slate-75';
                html += `<tr class="${rowBg} transition-all duration-200">`;
                row.forEach((cell, index) => {
                    const processedCell = cell.replace('✅ Included', '✔️ Covered').replace('❌ Not Covered', '—').replace('✔️ Covered', '<i class="fas fa-check text-blue-600"></i> Covered');
                    const columnType = columnTypes[index];
                    let cellStyle = '';
                    let baseClass = index === 0 ? 'px-3 py-2 font-medium text-gray-900 text-left bg-slate-50 border-r border-slate-100' : 'px-3 py-2 text-left';
                    
                    // Apply very light background to Employee/Employer columns
                    if (columnType === 'employee') {
                        cellStyle = ' style="background: #F5FCFC;"'; // Very light mint
                    } else if (columnType === 'employer') {

        // COMPREHENSIVE TABLE SORTING SYSTEM
        function initializeTableSorting() {
            // Initialize sorting for all existing tables
            setupAllTables();
            
            // Set up mutation observer to handle dynamically added tables
            setupTableMutationObserver();
        }
        
        function setupAllTables() {
            const tables = document.querySelectorAll('table');
            tables.forEach(table => setupTableSorting(table));
        }
        
        function setupTableMutationObserver() {
            const observer = new MutationObserver((mutations) => {
                mutations.forEach((mutation) => {
                    if (mutation.type === 'childList') {
                        mutation.addedNodes.forEach((node) => {
                            if (node.nodeType === Node.ELEMENT_NODE) {
                                // Check if the added node is a table or contains tables
                                if (node.tagName === 'TABLE') {
                                    setupTableSorting(node);
                                } else if (node.querySelectorAll) {
                                    const tables = node.querySelectorAll('table');
                                    tables.forEach(table => setupTableSorting(table));
                                }
                            }
                        });
                    }
                });
            });
            
            observer.observe(document.body, {
                childList: true,
                subtree: true
            });
        }
        
        function setupTableSorting(table) {
            if (table.classList.contains('sorting-enabled')) return; // Already setup
            
            const headers = table.querySelectorAll('th');
            if (headers.length === 0) return;
            
            headers.forEach((header, index) => {
                // Skip if header contains HTML elements that shouldn't be sortable
                if (header.querySelector('input, select, button')) return;
                
                header.classList.add('sortable');
                header.setAttribute('data-column', index);
                header.setAttribute('data-sort', 'none');
                header.title = 'Click to sort this column';
                
                header.addEventListener('click', (e) => {
                    e.preventDefault();
                    sortTable(table, index, header);
                });
            });
            
            table.classList.add('sorting-enabled');
        }
        
        function sortTable(table, columnIndex, header) {
            const tbody = table.querySelector('tbody');
            if (!tbody) return;
            
            const rows = Array.from(tbody.querySelectorAll('tr'));
            if (rows.length === 0) return;
            
            // Clear other headers' sort states
            const allHeaders = table.querySelectorAll('th');
            allHeaders.forEach(h => {
                if (h !== header) {
                    h.classList.remove('sort-asc', 'sort-desc');
                    h.setAttribute('data-sort', 'none');
                }
            });
            
            // Determine sort direction
            const currentSort = header.getAttribute('data-sort');
            let newSort;
            if (currentSort === 'none' || currentSort === 'desc') {
                newSort = 'asc';
            } else {
                newSort = 'desc';
            }
            
            // Update header appearance
            header.classList.remove('sort-asc', 'sort-desc');
            header.classList.add(`sort-${newSort}`);
            header.setAttribute('data-sort', newSort);
            header.title = `Sorted ${newSort}ending - click to ${newSort === 'asc' ? 'desc' : 'asc'}end`;
            
            // Sort the rows
            const sortedRows = rows.sort((a, b) => {
                const aCell = a.cells[columnIndex];
                const bCell = b.cells[columnIndex];
                
                if (!aCell || !bCell) return 0;
                
                let aValue = getCellValue(aCell);
                let bValue = getCellValue(bCell);
                
                // Try to parse as numbers first
                const aNum = parseTableNumber(aValue);
                const bNum = parseTableNumber(bValue);
                
                let comparison;
                if (!isNaN(aNum) && !isNaN(bNum)) {
                    // Numeric comparison
                    comparison = aNum - bNum;
                } else if (isTableDate(aValue) && isTableDate(bValue)) {
                    // Date comparison
                    const aDate = new Date(aValue);
                    const bDate = new Date(bValue);
                    comparison = aDate.getTime() - bDate.getTime();
                } else {
                    // String comparison
                    comparison = aValue.localeCompare(bValue, undefined, {
                        numeric: true,
                        sensitivity: 'base'
                    });
                }
                
                return newSort === 'asc' ? comparison : -comparison;
            });
            
            // Add sorting animation
            tbody.style.opacity = '0.7';
            tbody.style.transform = 'scale(0.98)';
            tbody.style.transition = 'all 0.15s ease';
            
            setTimeout(() => {
                // Clear tbody and append sorted rows
                tbody.innerHTML = '';
                sortedRows.forEach(row => tbody.appendChild(row));
                
                // Restore appearance with animation
                tbody.style.opacity = '1';
                tbody.style.transform = 'scale(1)';
                
                setTimeout(() => {
                    tbody.style.transition = '';
                }, 300);
            }, 150);
        }
        
        function getCellValue(cell) {
            // Get text content, removing HTML tags and extra whitespace
            let value = cell.textContent || cell.innerText || '';
            value = value.trim();
            
            // Remove common prefixes/suffixes for better sorting
            value = value.replace(/^[\$£€¥₹₽¢]+/, ''); // Remove currency symbols
            value = value.replace(/[%]+$/, ''); // Remove percentage symbols
            value = value.replace(/[,\s]/g, ''); // Remove commas and spaces from numbers
            
            return value;
        }
        
        function parseTableNumber(value) {
            // Handle various number formats including negative numbers
            const cleaned = value.replace(/[^\d.-]/g, '');
            const num = parseFloat(cleaned);
            return num;
        }
        
        function isTableDate(value) {
            // Check if value looks like a date
            const datePatterns = [
                /^\d{1,2}\/\d{1,2}\/\d{4}$/,  // MM/DD/YYYY
                /^\d{4}-\d{1,2}-\d{1,2}$/,    // YYYY-MM-DD
                /^\d{1,2}-\d{1,2}-\d{4}$/,    // MM-DD-YYYY
                /^(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)/i // Month names
            ];

            return datePatterns.some(pattern => pattern.test(value)) && !isNaN(Date.parse(value));
        }

        // ============================================================
        // GROSS TO NET CALCULATOR
        // ============================================================

        function calcProgressiveTax(income, brackets) {
            let tax = 0;
            for (const [min, max, rate] of brackets) {
                if (income <= min) break;
                tax += (Math.min(income, max) - min) * rate;
            }
            return Math.max(0, tax);
        }

        const GTN_COUNTRIES = window.GTN_COUNTRIES = {
            CA: {
                name: "Canada", currency: "CAD", symbol: "C$",
                regions: [{code:"BC", name:"British Columbia"},{code:"ON", name:"Ontario"}],
                calc(gross, mode, base, ytd=0, region='BC') {
                    const B = mode === 'bonus' ? base : 0;
                    const capBase = ytd > 0 ? ytd : (mode === 'bonus' ? B : 0);
                    const fedBrackets = [[0,58523,.14],[58523,117045,.205],[117045,181440,.26],[181440,258482,.29],[258482,Infinity,.33]];
                    const provTable = {
                        BC: { name:"British Columbia",
                              brackets:[[0,49279,.0506],[49279,98560,.077],[98560,113158,.105],[113158,137407,.1229],[137407,186306,.147],[186306,259829,.168],[259829,Infinity,.205]],
                              bpa:11981, bpaRate:0.0506, surtax:null, healthPremium:null },
                        ON: { name:"Ontario",
                              brackets:[[0,52886,.0505],[52886,105775,.0915],[105775,150000,.1116],[150000,220000,.1216],[220000,Infinity,.1316]],
                              bpa:12747, bpaRate:0.0505,
                              surtax:(t)=> Math.max(0,t-5710)*0.20 + Math.max(0,t-7307)*0.16,
                              healthPremium:(inc)=>{
                                  if (inc<=20000) return 0;
                                  if (inc<=36000) return Math.min(300, (inc-20000)*0.06);
                                  if (inc<=48000) return Math.min(450, 300 + (inc-36000)*0.06);
                                  if (inc<=72000) return Math.min(600, 450 + (inc-48000)*0.25);
                                  if (inc<=200000) return Math.min(750, 600 + (inc-72000)*0.25);
                                  return Math.min(900, 750 + (inc-200000)*0.25);
                              } }
                    };
                    const prov = provTable[region] || provTable.BC;
                    let fedTax, provTax, ohp = 0;
                    if (mode === 'regular') {
                        fedTax = Math.max(0, calcProgressiveTax(gross, fedBrackets) - 16500 * 0.14);
                        let basic = Math.max(0, calcProgressiveTax(gross, prov.brackets) - prov.bpa * prov.bpaRate);
                        if (prov.surtax) basic += prov.surtax(basic);
                        provTax = basic;
                        if (prov.healthPremium) ohp = prov.healthPremium(gross);
                    } else {
                        fedTax = calcProgressiveTax(B + gross, fedBrackets) - calcProgressiveTax(B, fedBrackets);
                        let baseTax  = calcProgressiveTax(B, prov.brackets);
                        let totTax   = calcProgressiveTax(B+gross, prov.brackets);
                        if (prov.surtax) { baseTax += prov.surtax(baseTax); totTax += prov.surtax(totTax); }
                        provTax = totTax - baseTax;
                        if (prov.healthPremium) ohp = prov.healthPremium(B+gross) - prov.healthPremium(B);
                    }
                    const cppPensionableUsed = Math.max(0, Math.min(capBase, 74600) - 3500);
                    const cppRoom = Math.max(0, 71100 - cppPensionableUsed);
                    const cpp = capBase === 0
                        ? Math.max(0, Math.min(gross, 74600) - 3500) * 0.0595
                        : Math.min(gross, cppRoom) * 0.0595;
                    const eiRoom = Math.max(0, 68900 - Math.min(capBase, 68900));
                    const ei = Math.min(gross, eiRoom) * 0.0163;
                    const deductions = [
                        {name:"Federal Income Tax",  amount:Math.max(0,fedTax), note: mode==='regular'?"Basic Personal Amount credit applied":"Marginal rate above base salary"},
                        {name:`${prov.name} Provincial Tax`, amount:Math.max(0,provTax), note: prov.surtax?"Includes provincial surtax":`${prov.name} rates`},
                        {name:"CPP Contribution (5.95%)", amount:cpp, note:"Earnings $3,500–$74,600"},
                        {name:"EI Premium (1.63%)",  amount:ei, note:"Max insurable earnings $68,900"}
                    ];
                    if (ohp > 0) deductions.push({name:"Ontario Health Premium", amount:ohp, note:"Tiered up to $900/yr"});
                    return { deductions,
                    net: gross - Math.max(0,fedTax) - Math.max(0,provTax) - cpp - ei - ohp,
                    notes:[`${prov.name} provincial rates used`,"BPA credit applied to regular salary","Bonus taxed at marginal federal + provincial rate"] };
                }
            },
            US: {
                name: "United States", currency: "USD", symbol: "$",
                calc(gross, mode, base, ytd=0) {
                    const B = mode === 'bonus' ? base : 0;
                    const capBase = ytd > 0 ? ytd : (mode === 'bonus' ? B : 0);
                    const std = 14600;
                    const brackets = [[0,11600,.10],[11600,47150,.12],[47150,100525,.22],[100525,191950,.24],[191950,243725,.32],[243725,609350,.35],[609350,Infinity,.37]];
                    let fedTax;
                    if (mode === 'regular') {
                        fedTax = calcProgressiveTax(Math.max(0, gross - std), brackets);
                    } else {
                        fedTax = calcProgressiveTax(Math.max(0,B+gross-std), brackets) - calcProgressiveTax(Math.max(0,B-std), brackets);
                    }
                    // SS: $168,600 wage base; adjust for YTD
                    const ssRoom = Math.max(0, 168600 - Math.min(capBase, 168600));
                    const ss = Math.min(gross, ssRoom) * 0.062;
                    const medicare = gross * 0.0145 + (gross > 200000 ? (gross-200000)*0.009 : 0);

        function setCalcMode(mode, countryCode) {
            window._calcMode = mode;
            document.querySelectorAll('.calc-mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('calc-mode-' + mode)?.classList.add('active');
            const isBonus = mode === 'bonus';
            document.getElementById('regular-input-group').style.display = isBonus ? 'none' : 'block';
            document.getElementById('bonus-base-group').style.display   = isBonus ? 'block' : 'none';
            document.getElementById('bonus-amount-group').style.display  = isBonus ? 'block' : 'none';
            const el = document.getElementById('calc-results-' + countryCode);
            if (el) { el.style.display = 'none'; el.innerHTML = ''; }
        }

        function recalculate(countryCode) {
            const mode = window._calcMode || 'regular';
            const config = GTN_COUNTRIES[countryCode];
            if (!config) return;
            let gross, base;
            if (mode === 'regular') {
                gross = parseFloat(document.getElementById('calc-gross')?.value) || 0;
                base = 0;
            } else {
                base  = parseFloat(document.getElementById('calc-base-salary')?.value) || 0;
                gross = parseFloat(document.getElementById('calc-bonus')?.value) || 0;
            }
            if (gross <= 0) return;
            const ytd = parseFloat(document.getElementById('calc-ytd')?.value) || 0;
            const region = document.getElementById('calc-region')?.value || (config.regions?.[0]?.code) || null;
            const result = config.calc(gross, mode, base, ytd, region);
            renderCalcResults(countryCode, gross, result, config);
        }

        function renderCalcResults(countryCode, gross, result, config) {
            const sym = config.symbol;
            const fmt = (n) => sym + ' ' + Math.abs(Math.round(n)).toLocaleString();
            const pct = (n, g) => g > 0 ? (Math.abs(n/g)*100).toFixed(1) : '0';
            const totalDed = result.deductions.reduce((s,d) => s + (d.amount||0), 0);
            const effRate = gross > 0 ? (totalDed/gross*100).toFixed(1) : '0';
            const palette = ['#EF4444','#F59E0B','#6366F1','#8B5CF6','#EC4899','#0EA5E9','#14B8A6'];
            const netColor = '#10B981';

            const flow = [
                `<span style="width:${Math.max(0,result.net/gross*100)}%;background:${netColor}"></span>`,
                ...result.deductions.map((d,i) => `<span style="width:${Math.max(0,(d.amount||0)/gross*100)}%;background:${palette[i%palette.length]}"></span>`)
            ].join('');

            const legend = [
                `<span class="lg-item"><span class="lg-dot" style="background:${netColor}"></span>Take-home (${pct(result.net,gross)}%)</span>`,
                ...result.deductions.map((d,i) => `<span class="lg-item"><span class="lg-dot" style="background:${palette[i%palette.length]}"></span>${d.name.split('(')[0].trim()}</span>`)
            ].join('');

            const rows = result.deductions.map((d,i) => {
                const c = palette[i % palette.length];
                return `<div class="calc-bd-row">
                    <span class="calc-bd-dot" style="background:${c}"></span>
                    <div>
                        <div class="calc-bd-name">${d.name}</div>
                        ${d.note ? `<span class="calc-bd-note">${d.note}</span>` : ''}
                    </div>
                    <div>
                        <div class="calc-bd-amt" style="color:${c}">−${fmt(d.amount)}</div>
                        <span class="calc-bd-pct">${pct(d.amount,gross)}% of gross</span>
                    </div>
                </div>`;
            }).join('');

            const notes = result.notes?.length
                ? `<div class="calc-notes">${result.notes.map(n => `<div class="calc-note-item"><i class="fas fa-circle-info text-indigo-400 mr-1"></i>${n}</div>`).join('')}</div>`
                : '';

            const a = result.net, m = a/12, sm = a/24;
            const html = `
                <div class="calc-hero-card">
                    <div class="calc-hero-label">Your Take-Home Pay</div>
                    <div class="calc-hero-amount" id="calc-hero-amount">${fmt(a)}</div>
                    <div class="calc-freq-tabs">
                        <button class="active" onclick="setCalcFreq(this,${a},'${sym}')">Annual</button>
                        <button onclick="setCalcFreq(this,${m},'${sym}')">Monthly</button>
                        <button onclick="setCalcFreq(this,${sm},'${sym}')">Semi-monthly</button>
                    </div>
                    <div class="calc-hero-meta">
                        Out of <strong>${fmt(gross)}</strong> gross &middot; <strong>${effRate}%</strong> effective tax &middot; you keep <strong>${(100-parseFloat(effRate)).toFixed(1)}%</strong>
                    </div>
                </div>
                <div class="calc-flow-title">Where Your Money Goes</div>
                <div class="calc-flow-bar">${flow}</div>
                <div class="calc-flow-legend">${legend}</div>
                <div class="calc-bd-card">
                    <div class="calc-bd-header">Deduction Breakdown</div>
                    ${rows}
                    <div class="calc-bd-row total">
                        <span class="calc-bd-dot" style="background:#09090B"></span>
                        <div><div class="calc-bd-name">Total Deductions</div></div>
                        <div>
                            <div class="calc-bd-amt">−${fmt(totalDed)}</div>
                            <span class="calc-bd-pct">${effRate}% of gross</span>
                        </div>
                    </div>
                </div>
                ${notes}`;

            const el = document.getElementById('calc-results-' + countryCode);
            if (el) { el.innerHTML = html; el.style.display = 'block'; }
        }

        function setCalcFreq(btn, amount, sym) {
            btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const el = document.getElementById('calc-hero-amount');
            if (el) el.textContent = sym + ' ' + Math.round(Math.abs(amount)).toLocaleString();
        }

        function setCalcRegion(btn, code, country) {
            btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const hidden = document.getElementById('calc-region');
            if (hidden) hidden.value = code;
            recalculate(country);
        }

                steps: [
                    'Determine VND FMV of tokens on vest/exercise date using reputable exchange rate',

        function switchView(view) {
            const country = document.getElementById('country-view');
            const calc = document.getElementById('calc-view');
            const token = document.getElementById('token-view');
            document.getElementById('view-tab-country').classList.toggle('active', view === 'country');
            document.getElementById('view-tab-calc').classList.toggle('active', view === 'calc');
            document.getElementById('view-tab-token').classList.toggle('active', view === 'token');
            country.style.display = view === 'country' ? 'block' : 'none';
            calc.style.display = view === 'calc' ? 'block' : 'none';
            token.style.display = view === 'token' ? 'block' : 'none';
            if (view === 'token') renderTokenPage();
            if (view === 'calc') renderCalcPage();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderCalcPage() {
            const code = window.currentCountry || 'CA';
            const config = window.GTN_COUNTRIES?.[code];
            const target = document.getElementById('calc-page-content');
            if (!target) return;
            const countryOptions = COUNTRY_LIST
                .filter(c => window.GTN_COUNTRIES?.[c.code === 'UK' ? 'UK' : c.code] || window.GTN_COUNTRIES?.[c.code])
                .map(c => `<option value="${c.code}" ${c.code === code ? 'selected' : ''}>${c.flag}  ${c.name}</option>`)
                .join('');
            target.innerHTML = `
                <div class="calc-page-wrap">
                    <div class="calc-page-hero">
                        <div class="calc-page-hero-inner">
                            <div class="tk-hero-eyebrow"><i class="fas fa-calculator"></i> Gross-to-Net Calculator</div>
                            <h1 class="tk-hero-title">Estimate take-home pay across jurisdictions</h1>
                            <p class="tk-hero-sub">Regular salary or bonus mode, with optional YTD adjustment for social-contribution caps.</p>
                        </div>
                        <div class="calc-hero-country">
                            <label>Country</label>
                            <select id="calc-country-select" onchange="onCalcCountryChange(this.value)">
                                ${countryOptions}
                            </select>
                        </div>
                    </div>
                    <div id="calc-page-host"></div>
                </div>`;
            renderCalcInline(code);
        }

        function onCalcCountryChange(code) {
            window.currentCountry = code;
            renderCalcInline(code);
        }

        function renderCalcInline(code) {
            const host = document.getElementById('calc-page-host');
            if (!host) return;
            const config = window.GTN_COUNTRIES?.[code];
            if (!config) {
                host.innerHTML = `<p style="padding:2rem;color:#71717A">Calculator not available for ${code}.</p>`;
                return;
            }
            window._calcMode = 'regular';
            window._calcCountry = code;
            host.innerHTML = `
                <div class="calc-container">
                    <div class="calc-header">
                        <div class="calc-header-icon"><i class="fas fa-calculator"></i></div>
                        <div>
                            <div class="calc-title">Gross to Net</div>
                            <div class="calc-subtitle">${config.name} · ${config.currency}</div>
                        </div>
                    </div>
                    <div class="calc-mode-toggle">
                        <button class="calc-mode-btn active" id="calc-mode-regular" onclick="setCalcMode('regular','${code}')"><i class="fas fa-user mr-1"></i> Regular Salary</button>
                        <button class="calc-mode-btn" id="calc-mode-bonus" onclick="setCalcMode('bonus','${code}')"><i class="fas fa-star mr-1"></i> Bonus</button>
                    </div>
                    <div class="calc-grid">
                      <div class="calc-grid-inputs">
                        ${config.regions ? `
                        <div class="calc-input-group">
                            <label class="calc-label">Region</label>
                            <input type="hidden" id="calc-region" value="${config.regions[0].code}" />
                            <div class="calc-region-pill">
                                ${config.regions.map((r,i) => `<button class="${i===0?'active':''}" onclick="setCalcRegion(this,'${r.code}','${code}')">${r.name}</button>`).join('')}
                            </div>
                        </div>` : ''}
                        <div id="regular-input-group" class="calc-input-group">
                            <label class="calc-label">Annual Gross Salary (${config.currency})</label>
                            <div class="calc-input-wrapper">
                                <span class="calc-currency-symbol">${config.symbol}</span>
                                <input type="number" id="calc-gross" class="calc-input" placeholder="e.g. 100000" oninput="recalculate('${code}')" />
                            </div>
                        </div>
                        <div id="bonus-base-group" class="calc-input-group" style="display:none">
                            <label class="calc-label">Annual Base Salary (${config.currency})</label>
                            <div class="calc-input-wrapper">
                                <span class="calc-currency-symbol">${config.symbol}</span>
                                <input type="number" id="calc-base-salary" class="calc-input" placeholder="e.g. 120000" oninput="recalculate('${code}')" />
                            </div>
                        </div>
                        <div class="calc-input-group" style="margin-top:1.25rem;padding-top:1.25rem;border-top:1px solid #E4E4E7">
                            <label class="calc-label">YTD Gross Earned <span style="font-weight:400;color:#A1A1AA">— Optional (adjusts social contribution caps)</span></label>
                            <div class="calc-input-wrapper">
                                <span class="calc-currency-symbol">${config.symbol}</span>
                                <input type="number" id="calc-ytd" class="calc-input" placeholder="Leave blank if start of year" oninput="recalculate('${code}')" />
                            </div>
                        </div>
                        <div id="bonus-amount-group" class="calc-input-group" style="display:none">
                            <label class="calc-label">Bonus Amount (${config.currency})</label>
                            <div class="calc-input-wrapper">
                                <span class="calc-currency-symbol">${config.symbol}</span>
                                <input type="number" id="calc-bonus" class="calc-input" placeholder="e.g. 20000" oninput="recalculate('${code}')" />
                            </div>
                        </div>
                      </div>
                      <div class="calc-grid-results">
                        <div id="calc-results-${code}" class="calc-results-container" style="display:none"></div>
                      </div>
                    </div>
                    <div class="calc-disclaimer">
                        <i class="fas fa-circle-info mr-1"></i>
                        Estimates only. Does not account for all personal deductions, credits, or local taxes. Consult a tax professional for precise figures.
                    </div>
                </div>`;
        }

        const TOKEN_REGIONS = {
            'all':      { label: 'All Countries', icon: 'fa-globe', codes: null },
            'americas': { label: 'Americas',      icon: 'fa-earth-americas', codes: ['CA','US'] },
            'europe':   { label: 'Europe',        icon: 'fa-earth-europe', codes: ['GB','DE','NL','PL','PT','ES','LU'] },
            'asia':     { label: 'Asia-Pacific',  icon: 'fa-earth-asia', codes: ['CN','HK','IN','KR','SG','TH','VN'] },
            'mena':     { label: 'MENA',          icon: 'fa-mosque', codes: ['TR','AE'] }
        };
        window._tokenRegion = 'all';
        window._tokenSearch = '';

        function setTokenRegion(region) {
            window._tokenRegion = region;
            renderTokenPage();
        }

        function setTokenSearch(value) {
            window._tokenSearch = (value || '').toLowerCase().trim();
            renderTokenCards();
        }

        function toggleTokenCard(code) {
            const card = document.getElementById('tk-card-' + code);
            const detail = document.getElementById('tk-detail-' + code);
            const chevron = document.getElementById('tk-chev-' + code);
            if (!card) return;
            const isOpen = card.classList.toggle('expanded');
            if (detail) detail.style.display = isOpen ? 'block' : 'none';
            if (chevron) chevron.style.transform = isOpen ? 'rotate(180deg)' : 'rotate(0deg)';
        }

        function _statusBadge(c) {
            if (c.code === 'CN') return `<span class="tk-badge danger"><i class="fas fa-ban"></i> Banned (PBOC)</span>`;
            if (c.code === 'AE') return `<span class="tk-badge neutral"><i class="fas fa-check"></i> No Income Tax</span>`;
            if (!c.withholdingRequired) return `<span class="tk-badge warning"><i class="fas fa-circle-info"></i> Self-Assessed</span>`;
            return `<span class="tk-badge success"><i class="fas fa-shield-halved"></i> Withholding Required</span>`;
        }

        function _buildCountryCard(c) {
            const badge = _statusBadge(c);
            const summaryEvent = c.taxableEvent.split(' — ')[0];
            const steps = c.steps.map((s, i) => `
                <div class="tk-step">
                    <div class="tk-step-num">${i+1}</div>
                    <div class="tk-step-text">${s}</div>
                    ${i < c.steps.length - 1 ? '<div class="tk-step-line"></div>' : ''}
                </div>`).join('');

            return `
            <div class="tk-card" id="tk-card-${c.code}">
                <div class="tk-card-head" onclick="toggleTokenCard('${c.code}')">
                    <div class="tk-flag">${c.flag}</div>
                    <div class="tk-card-title">
                        <div class="tk-country-name">${c.name}</div>
                        <div class="tk-currency-line">${c.currency} • ${c.code}</div>
                    </div>
                    <div class="tk-status-wrap">${badge}</div>
                    <div class="tk-chevron" id="tk-chev-${c.code}"><i class="fas fa-chevron-down"></i></div>
                </div>
                <div class="tk-card-preview">
                    <div class="tk-preview-row">
                        <i class="fas fa-calendar-day tk-pi"></i>
                        <div><span class="tk-preview-label">Taxable Event</span> ${summaryEvent}</div>
                    </div>
                    <div class="tk-preview-row">
                        <i class="fas fa-file-invoice-dollar tk-pi"></i>
                        <div><span class="tk-preview-label">Income Type</span> ${c.incomeType}</div>
                    </div>
                </div>
                <div class="tk-card-detail" id="tk-detail-${c.code}" style="display:none">
                    <div class="tk-section">
                        <div class="tk-sec-title"><i class="fas fa-bolt"></i> When does it become taxable?</div>
                        <div class="tk-sec-body">${c.taxableEvent}</div>
                    </div>
                    <div class="tk-grid-2">
                        <div class="tk-section blue">
                            <div class="tk-sec-title"><i class="fas fa-money-bill-trend-up"></i> Payroll Withholding</div>
                            <div class="tk-sec-body">${c.withholdingNote}</div>
                        </div>
                        <div class="tk-section purple">
                            <div class="tk-sec-title"><i class="fas fa-hand-holding-medical"></i> Social Contributions</div>
                            <div class="tk-sec-body">${c.socialContributions}</div>
                        </div>
                    </div>
                    <div class="tk-grid-2">
                        <div class="tk-section emerald">
                            <div class="tk-sec-title"><i class="fas fa-file-lines"></i> Key Forms & Reporting</div>
                            <div class="tk-sec-body">${c.keyForms}</div>
                        </div>
                        <div class="tk-section amber">
                            <div class="tk-sec-title"><i class="fab fa-bitcoin"></i> Crypto-Specific Notes</div>
                            <div class="tk-sec-body">${c.cryptoSpecific}</div>
                        </div>
                    </div>
                    <div class="tk-section">
                        <div class="tk-sec-title"><i class="fas fa-list-check"></i> How to Process</div>
                        <div class="tk-steps">${steps}</div>
                    </div>
                </div>
            </div>`;
        }

        function renderTokenCards() {
            const region = window._tokenRegion || 'all';
            const search = window._tokenSearch || '';
            const codes = TOKEN_REGIONS[region]?.codes;
            const filtered = TOKEN_COUNTRIES.filter(c => {
                if (codes && !codes.includes(c.code)) return false;
                if (search && !(c.name.toLowerCase().includes(search) || c.code.toLowerCase().includes(search) || c.currency.toLowerCase().includes(search))) return false;
                return true;
            });
            const grid = document.getElementById('tk-grid');
            const count = document.getElementById('tk-count');
            if (count) count.textContent = filtered.length;
            if (!grid) return;
            grid.innerHTML = filtered.length
                ? filtered.map(_buildCountryCard).join('')
                : `<div class="tk-empty"><i class="fas fa-circle-question"></i><div>No countries match your filters</div></div>`;
        }

        function renderTokenPage() {
            const totalCountries = TOKEN_COUNTRIES.length;
            const requiredCount = TOKEN_COUNTRIES.filter(c => c.withholdingRequired && c.code !== 'CN').length;
            const noWithhold = TOKEN_COUNTRIES.filter(c => !c.withholdingRequired || c.code === 'AE').length;
            const flagged = TOKEN_COUNTRIES.filter(c => c.code === 'CN').length;

            const region = window._tokenRegion || 'all';
            const regionPills = Object.entries(TOKEN_REGIONS).map(([k, r]) => `
                <button class="tk-region-pill ${region === k ? 'active' : ''}" onclick="setTokenRegion('${k}')">
                    <i class="fas ${r.icon}"></i> ${r.label}
                </button>`).join('');

            document.getElementById('token-page-content').innerHTML = `
            <div class="tk-page">
                <!-- HERO -->
                <div class="tk-hero">
                    <div class="tk-hero-glow"></div>
                    <div class="tk-hero-inner">
                        <div class="tk-hero-eyebrow"><i class="fas fa-coins"></i> Token & Crypto Compensation</div>
                        <h1 class="tk-hero-title">Global Token Vesting & Payroll Playbook</h1>
                        <p class="tk-hero-sub">What triggers tax, what payroll withholds, and how to process across 18 jurisdictions.</p>
                    </div>
                    <div class="tk-hero-stats">
                        <div class="tk-stat"><div class="tk-stat-num">${totalCountries}</div><div class="tk-stat-lbl">Countries</div></div>
                        <div class="tk-stat"><div class="tk-stat-num">${requiredCount}</div><div class="tk-stat-lbl">Withholding</div></div>
                        <div class="tk-stat"><div class="tk-stat-num">${noWithhold}</div><div class="tk-stat-lbl">Self-assessed</div></div>
                        <div class="tk-stat danger"><div class="tk-stat-num">${flagged}</div><div class="tk-stat-lbl">Banned</div></div>
                    </div>
                </div>

                <!-- LEGEND -->
                <div class="tk-legend">
                    <div class="tk-legend-item"><span class="tk-badge success"><i class="fas fa-shield-halved"></i> Withholding Required</span> Employer must withhold income tax via payroll</div>
                    <div class="tk-legend-item"><span class="tk-badge warning"><i class="fas fa-circle-info"></i> Self-Assessed</span> Employee files; employer reports only</div>
                    <div class="tk-legend-item"><span class="tk-badge neutral"><i class="fas fa-check"></i> No Income Tax</span> No withholding needed</div>
                    <div class="tk-legend-item"><span class="tk-badge danger"><i class="fas fa-ban"></i> Banned</span> Crypto comp illegal — must structure offshore</div>
                </div>

                <!-- FILTER BAR -->
                <div class="tk-filter-bar">
                    <div class="tk-region-pills">${regionPills}</div>
                    <div class="tk-search">
                        <i class="fas fa-magnifying-glass"></i>
                        <input type="text" placeholder="Search country, code, or currency..." oninput="setTokenSearch(this.value)" />
                    </div>
                </div>
                <div class="tk-result-line">Showing <span id="tk-count">${TOKEN_COUNTRIES.length}</span> jurisdictions</div>

                <!-- COUNTRY GRID -->
                <div class="tk-grid" id="tk-grid"></div>

                <!-- DISCLAIMER -->
                <div class="tk-disclaimer">
                    <i class="fas fa-triangle-exclamation"></i>
                    <div>
                        <strong>General reference only.</strong> Token/crypto payroll rules are evolving rapidly — consult local tax counsel before processing actual events. Rates, forms, and thresholds reflect 2025–2026 guidance and are subject to legislative change.
                    </div>
                </div>
            </div>`;
            renderTokenCards();
        }
    </script>
</body>
</html>
